<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>십대 놀거리 지도</title>

  <!-- 카카오맵 API -->
  <script
    type="text/javascript"
    src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=0432075e4c51b7ebcfb38b60ed1b5d2e&libraries=services&autoload=false"
  ></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background-color: #f5f5f5;
    }

    /* 전체 레이아웃 */
    .container {
      display: flex;
      width: 100%;
      height: 100vh;
    }

    /* 왼쪽 패널 */
    .sidebar {
      width: 35%;
      min-width: 340px;
      background-color: white;
      border-right: 1px solid #ddd;
      display: flex;
      flex-direction: column;
    }

    /* 상단 영역 */
    .top-box {
      padding: 20px;
      border-bottom: 1px solid #ddd;
    }

    .top-box h1 {
      font-size: 24px;
      margin-bottom: 15px;
    }

    /* 검색창 */
    .search-form {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }

    .search-form input {
      flex: 1;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 15px;
    }

    .search-form button {
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      background-color: #f7e600;
      cursor: pointer;
      font-weight: bold;
    }

    .search-form button:hover {
      opacity: 0.9;
    }

    /* 카테고리 버튼 */
    .category-box {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .category-button {
      padding: 10px 14px;
      border: none;
      border-radius: 20px;
      background-color: #eeeeee;
      cursor: pointer;
      font-size: 14px;
      transition: 0.2s;
    }

    .category-button:hover {
      background-color: #f7e600;
    }

    /* 결과 리스트 */
    .result-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    .result-item {
      padding: 16px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
      transition: 0.2s;
      border-radius: 10px;
    }

    .result-item:hover {
      background-color: #fafafa;
    }

    .place-name {
      font-size: 17px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .place-category {
      font-size: 13px;
      color: #ff7b00;
      margin-bottom: 5px;
    }

    .place-address {
      font-size: 14px;
      color: #666;
      margin-bottom: 5px;
    }

    .place-phone {
      font-size: 13px;
      color: #999;
    }

    /* 지도 영역 */
    .map-area {
      flex: 1;
      position: relative;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    /* 모바일 대응 */
    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        height: 45%;
      }

      .map-area {
        height: 55%;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- 왼쪽 패널 -->
    <div class="sidebar">

      <div class="top-box">

        <h1>십대 놀거리 지도 🎉</h1>

        <!-- 검색창 -->
        <form class="search-form" id="searchForm">
          <input
            type="text"
            id="keyword"
            placeholder="장소 검색"
          />

          <button type="submit">
            검색
          </button>
        </form>

        <!-- 추천 카테고리 -->
        <div class="category-box">

          <button class="category-button" data-keyword="놀이터">
            놀이터
          </button>

          <button class="category-button" data-keyword="영화관">
            영화관
          </button>

          <button class="category-button" data-keyword="PC방">
            PC방
          </button>

          <button class="category-button" data-keyword="노래방">
            노래방
          </button>

          <button class="category-button" data-keyword="떡볶이">
            떡볶이
          </button>

          <button class="category-button" data-keyword="카페">
            카페
          </button>

          <button class="category-button" data-keyword="보드게임카페">
            보드게임
          </button>

          <button class="category-button" data-keyword="볼링장">
            볼링장
          </button>

        </div>
      </div>

      <!-- 검색 결과 -->
      <div class="result-list" id="resultList"></div>
    </div>

    <!-- 지도 -->
    <div class="map-area">
      <div id="map"></div>
    </div>

  </div>

  <script>

    let map;
    let placeService;
    let infoWindow;

    // 마커 저장 배열
    let markers = [];

    // 현재 위치 저장
    let currentLatitude;
    let currentLongitude;

    // 카카오맵 로드 완료 후 실행
    kakao.maps.load(() => {

      // 현재 위치 요청
      navigator.geolocation.getCurrentPosition(

        (position) => {

          currentLatitude = position.coords.latitude;
          currentLongitude = position.coords.longitude;

          initializeMap(currentLatitude, currentLongitude);
        },

        // 위치 권한 거부 시 기본 위치 사용
        () => {

          currentLatitude = 37.5665;
          currentLongitude = 126.9780;

          initializeMap(currentLatitude, currentLongitude);
        }
      );
    });

    // 지도 초기화 함수
    function initializeMap(lat, lng) {

      const mapContainer = document.getElementById("map");

      const mapOption = {
        center: new kakao.maps.LatLng(lat, lng),

        // 확대 레벨
        level: 5
      };

      // 지도 생성
      map = new kakao.maps.Map(mapContainer, mapOption);

      // 장소 검색 서비스 생성
      placeService = new kakao.maps.services.Places();

      // 인포윈도우 생성
      infoWindow = new kakao.maps.InfoWindow({
        zIndex: 1
      });

      // 현재 위치 표시
      showCurrentLocation(lat, lng);

      // 검색 이벤트 연결
      connectSearchEvent();

      // 카테고리 버튼 이벤트 연결
      connectCategoryButtons();

      // 처음 실행 시 자동 추천
      searchTeenPlace("영화관");
    }

    // 현재 위치 표시
    function showCurrentLocation(lat, lng) {

      const currentPosition = new kakao.maps.LatLng(lat, lng);

      const currentMarker = new kakao.maps.Marker({
        map: map,
        position: currentPosition
      });

      const currentInfo = new kakao.maps.InfoWindow({
        content: `
          <div style="padding:6px;font-size:13px;">
            📍 현재 위치
          </div>
        `
      });

      currentInfo.open(map, currentMarker);
    }

    // 검색 이벤트 연결
    function connectSearchEvent() {

      const searchForm = document.getElementById("searchForm");

      searchForm.addEventListener("submit", (event) => {

        event.preventDefault();

        const keyword = document
          .getElementById("keyword")
          .value
          .trim();

        if (!keyword) {
          alert("검색어를 입력해주세요.");
          return;
        }

        searchTeenPlace(keyword);
      });
    }

    // 카테고리 버튼 이벤트 연결
    function connectCategoryButtons() {

      const categoryButtons =
        document.querySelectorAll(".category-button");

      categoryButtons.forEach((button) => {

        button.addEventListener("click", () => {

          const keyword = button.dataset.keyword;

          searchTeenPlace(keyword);
        });
      });
    }

    // 장소 검색 함수
    function searchTeenPlace(keyword) {

      // 현재 위치 중심으로 검색
      const searchOption = {
        location: new kakao.maps.LatLng(
          currentLatitude,
          currentLongitude
        ),

        radius: 5000
      };

      placeService.keywordSearch(
        keyword,
        handleSearchResult,
        searchOption
      );
    }

    // 검색 결과 처리
    function handleSearchResult(data, status) {

      if (status !== kakao.maps.services.Status.OK) {

        alert("검색 결과가 없습니다.");
        return;
      }

      removeMarkers();

      displayResultList(data);

      const bounds = new kakao.maps.LatLngBounds();

      data.forEach((place) => {

        const position = new kakao.maps.LatLng(
          place.y,
          place.x
        );

        // 마커 생성
        const marker = new kakao.maps.Marker({
          map: map,
          position: position
        });

        markers.push(marker);

        // 지도 범위 추가
        bounds.extend(position);

        // 마커 클릭 이벤트
        kakao.maps.event.addListener(
          marker,
          "click",
          () => {

            showInfoWindow(place, marker);
          }
        );
      });

      // 검색 결과에 맞게 지도 이동
      map.setBounds(bounds);
    }

    // 인포윈도우 표시
    function showInfoWindow(place, marker) {

      infoWindow.setContent(`
        <div style="
          padding:10px;
          font-size:13px;
          width:220px;
        ">
          <strong style="font-size:15px;">
            ${place.place_name}
          </strong>
          <br><br>

          📍 ${place.road_address_name || place.address_name}
          <br><br>

          ☎ ${place.phone || "전화번호 없음"}
        </div>
      `);

      infoWindow.open(map, marker);
    }

    // 검색 결과 리스트 출력
    function displayResultList(places) {

      const resultList =
        document.getElementById("resultList");

      resultList.innerHTML = "";

      places.forEach((place, index) => {

        const item = document.createElement("div");

        item.className = "result-item";

        item.innerHTML = `
          <div class="place-name">
            ${place.place_name}
          </div>

          <div class="place-category">
            ${place.category_name}
          </div>

          <div class="place-address">
            ${place.road_address_name || place.address_name}
          </div>

          <div class="place-phone">
            ${place.phone || "전화번호 없음"}
          </div>
        `;

        // 리스트 클릭 시 이동
        item.addEventListener("click", () => {

          const movePosition =
            new kakao.maps.LatLng(
              place.y,
              place.x
            );

          map.setCenter(movePosition);

          map.setLevel(3);

          showInfoWindow(
            place,
            markers[index]
          );
        });

        resultList.appendChild(item);
      });
    }

    // 기존 마커 제거
    function removeMarkers() {

      markers.forEach((marker) => {

        marker.setMap(null);
      });

      markers = [];
    }

  </script>

</body>
</html>
